<svg viewBox="0 0 1000 200" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0f1729"/>
      <stop offset="100%" stop-color="#1f2a44"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#c9a227"/>
    </marker>
  </defs>

  <rect width="1000" height="200" rx="14" fill="url(#bg)"/>

  <!-- connecting line -->
  <line x1="95" y1="100" x2="905" y2="100" stroke="#39456b" stroke-width="3"/>

  <!-- traveling pulse -->
  <circle r="6" fill="#c9a227">
    <animateMotion dur="4s" repeatCount="indefinite"
      path="M95,100 L275,100 L455,100 L635,100 L815,100" />
    <animate attributeName="opacity" values="1;1;0;1" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- Node template: circle + icon glyph + label -->
  <!-- 1. Raw Data -->
  <g>
    <circle cx="95" cy="100" r="34" fill="#1f2a44" stroke="#c9a227" stroke-width="2.5">
      <animate attributeName="stroke-width" values="2.5;4;2.5" dur="4s" begin="0s" repeatCount="indefinite"/>
    </circle>
    <text x="95" y="107" text-anchor="middle" font-size="22" fill="#c9a227">⛃</text>
    <text x="95" y="150" text-anchor="middle" font-size="13" fill="#e8e8ec" font-weight="600">Raw Data</text>
    <text x="95" y="167" text-anchor="middle" font-size="10.5" fill="#9aa3b8">31,047 orders</text>
  </g>

  <!-- 2. Cleaning -->
  <g>
    <circle cx="275" cy="100" r="34" fill="#1f2a44" stroke="#39456b" stroke-width="2.5">
      <animate attributeName="stroke" values="#39456b;#c9a227;#39456b" dur="4s" begin="0.9s" repeatCount="indefinite"/>
    </circle>
    <text x="275" y="107" text-anchor="middle" font-size="22" fill="#c9a227">🧹</text>
    <text x="275" y="150" text-anchor="middle" font-size="13" fill="#e8e8ec" font-weight="600">Data Cleaning</text>
    <text x="275" y="167" text-anchor="middle" font-size="10.5" fill="#9aa3b8">Excel Power Query</text>
  </g>

  <!-- 3. EDA -->
  <g>
    <circle cx="455" cy="100" r="34" fill="#1f2a44" stroke="#39456b" stroke-width="2.5">
      <animate attributeName="stroke" values="#39456b;#c9a227;#39456b" dur="4s" begin="1.8s" repeatCount="indefinite"/>
    </circle>
    <text x="455" y="107" text-anchor="middle" font-size="22" fill="#c9a227">📊</text>
    <text x="455" y="150" text-anchor="middle" font-size="13" fill="#e8e8ec" font-weight="600">EDA</text>
    <text x="455" y="167" text-anchor="middle" font-size="10.5" fill="#9aa3b8">Trends · Segments</text>
  </g>

  <!-- 4. Dashboard -->
  <g>
    <circle cx="635" cy="100" r="34" fill="#1f2a44" stroke="#39456b" stroke-width="2.5">
      <animate attributeName="stroke" values="#39456b;#c9a227;#39456b" dur="4s" begin="2.7s" repeatCount="indefinite"/>
    </circle>
    <text x="635" y="107" text-anchor="middle" font-size="22" fill="#c9a227">📈</text>
    <text x="635" y="150" text-anchor="middle" font-size="13" fill="#e8e8ec" font-weight="600">Dashboard</text>
    <text x="635" y="167" text-anchor="middle" font-size="10.5" fill="#9aa3b8">Pivot charts</text>
  </g>

  <!-- 5. Insights -->
  <g>
    <circle cx="815" cy="100" r="34" fill="#1f2a44" stroke="#39456b" stroke-width="2.5">
      <animate attributeName="stroke" values="#39456b;#c9a227;#39456b" dur="4s" begin="3.6s" repeatCount="indefinite"/>
    </circle>
    <text x="815" y="107" text-anchor="middle" font-size="22" fill="#c9a227">💡</text>
    <text x="815" y="150" text-anchor="middle" font-size="13" fill="#e8e8ec" font-weight="600">Insights</text>
    <text x="815" y="167" text-anchor="middle" font-size="10.5" fill="#9aa3b8">Business report</text>
  </g>

  <text x="500" y="30" text-anchor="middle" font-size="15" fill="#e8e8ec" font-weight="700" letter-spacing="1">
    VRINDA STORE — END-TO-END SALES ANALYTICS WORKFLOW
  </text>
</svg>
